<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#1E3D2D"/>
      <stop offset="55%" stop-color="#152E22"/>
      <stop offset="100%" stop-color="#0A1A12"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5D88A"/>
      <stop offset="50%" stop-color="#E7C16A"/>
      <stop offset="100%" stop-color="#9B7828"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Frame -->
  <rect x="54" y="54" width="404" height="404" rx="64" ry="64"
        fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.55"/>

  <!-- Clipboard / list motif -->
  <g transform="translate(256 256)">
    <!-- Clipboard back -->
    <rect x="-118" y="-150" width="236" height="300" rx="18" ry="18"
          fill="#0F2419" stroke="url(#gold)" stroke-width="3"/>
    <!-- Clip -->
    <rect x="-42" y="-172" width="84" height="30" rx="8" ry="8"
          fill="url(#gold)"/>
    <!-- List lines (5 = ranks) -->
    <g stroke="#E7C16A" stroke-width="4" stroke-linecap="round" opacity="0.9">
      <line x1="-72" y1="-90" x2="72" y2="-90"/>
      <line x1="-72" y1="-40" x2="50" y2="-40"/>
      <line x1="-72" y1="10" x2="60" y2="10"/>
      <line x1="-72" y1="60" x2="40" y2="60"/>
      <line x1="-72" y1="110" x2="72" y2="110"/>
    </g>
    <!-- Accent dots at line ends (rank markers) -->
    <g fill="#E7C16A">
      <circle cx="-86" cy="-90" r="5"/>
      <circle cx="-86" cy="-40" r="5"/>
      <circle cx="-86" cy="10" r="5" opacity="0.6"/>
      <circle cx="-86" cy="60" r="5" opacity="0.45"/>
      <circle cx="-86" cy="110" r="5" opacity="0.3"/>
    </g>
  </g>

  <!-- "幹事" label ribbon -->
  <g transform="translate(256 420)">
    <rect x="-60" y="-16" width="120" height="30" rx="15" ry="15"
          fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.8"/>
    <text x="0" y="5" text-anchor="middle"
          font-family="'Noto Sans JP', 'Hiragino Sans', sans-serif"
          font-weight="600" font-size="14" letter-spacing="4" fill="#E7C16A">幹事</text>
  </g>
</svg>
